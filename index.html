<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <!-- ***** FAVICON (from images/) ***** -->
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="apple-touch-icon" href="images/favicon.png">

  <!-- ***** PWA MANIFEST ***** -->
  <link rel="manifest" href="manifest.json">

  <!-- ***** iOS SPECIFIC META ***** -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Tasbih · Digital Zikr">
  <link rel="apple-touch-icon" href="images/icon-192.png">

  <!-- ***** TOP‑LEVEL SEO ***** -->
  <title>Tasbih · Digital Zikr</title>
  <meta name="description" content="Beautiful, minimal tasbih counter with circular progress, target rounds & haptic feedback.">
  <meta name="keywords" content="tasbih, counter, digital tasbih, dhikr, islamic counter, zikr, beads, target, modal">
  <meta name="author" content="Your Ibadah">
  <meta name="theme-color" content="#f7c948">
  <meta property="og:title" content="Tasbih · Digital Zikr">
  <meta property="og:description" content="Track your dhikr with elegance – circular progress, target rounds & smooth haptics.">
  <meta property="og:type" content="website">

  <!-- Google fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Amiri:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --accent: #f7c948;
  --text: #f7c948;
  --percent-bg: #161b22;
  --modal-overlay: rgba(0,0,0,0.7);
  --glow-color: rgba(247, 201, 72, 0.9);
}

body.light {
  --bg: #ffffff;
  --card: #f5f5f5;
  --accent: #2e7d32;
  --text: #2e7d32;
  --percent-bg: #e8f5e9;
  --modal-overlay: rgba(0,0,0,0.2);
  --glow-color: rgba(46, 125, 50, 0.9);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

body{
  background:var(--bg);
  font-family:'Amiri', serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  transition:0.3s;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

.app{
  width:100%;
  max-width:420px;
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding:14px 16px 22px;
}

.top-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.spacer{width:48px;visibility:hidden;}

.zikr{
  font-size:24px;
  font-weight:700;
  color:var(--accent);
  text-align:center;
  flex:1;
  user-select: text;
}

/* Theme toggle - perfect centering */
.theme-toggle{
  background:var(--card);
  color:var(--accent);
  width:48px;
  height:48px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  border:1px solid var(--accent);
  line-height:1;
  padding:0;
  text-align:center;
}

.middle-section{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:0;
}

.circle-wrapper{
  position:relative;
  width:min(420px, 90vw);
  height:min(420px, 90vw);
}

svg{
  width:100%;
  height:100%;
  transform:rotate(-90deg);
}

circle{
  fill:none;
  stroke-width:12;
}

.bg{
  stroke:var(--card);
  opacity:0.6;
}

.progress{
  stroke:var(--accent);
  stroke-linecap:round;
  transition:stroke-dashoffset 0.25s ease;
}

.tap-area{
  position:absolute;
  inset:0;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

.tap-area:active{
  transform:scale(0.96);
}

/* Welcome glow animation (2 pulses) */
@keyframes glowPulse {
  0% {
    box-shadow: 0 0 0 0 var(--glow-color);
  }
  50% {
    box-shadow: 0 0 30px 15px var(--glow-color);
  }
  100% {
    box-shadow: 0 0 0 0 var(--glow-color);
  }
}
.glow-pulse {
  animation: glowPulse 1s ease 2;
}

/* Smooth tap glow for infinite mode */
@keyframes smoothTapGlow {
  0% {
    box-shadow: 0 0 0 0 var(--glow-color);
  }
  30% {
    box-shadow: 0 0 25px 12px var(--glow-color);
  }
  100% {
    box-shadow: 0 0 0 0 var(--glow-color);
  }
}
.tap-glow {
  animation: smoothTapGlow 0.2s ease-out;
}

.count{
  font-size:clamp(52px,16vw,85px);
  font-family:'Orbitron', sans-serif;
  color:var(--accent);
  text-shadow:0 0 12px var(--accent);
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

/* ===== STATIC PERCENT (under the circle) ===== */
.static-percent{
  background:var(--percent-bg);
  border:1px solid var(--accent);
  padding:6px 20px;
  border-radius:40px;
  font-family:'Orbitron', sans-serif;
  font-size:18px;
  color:var(--accent);
  margin-top:5px;
  user-select: none;
  display:inline-block;
}

.bottom-controls{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* Stats row - gap minimum */
.stats-row{
  display:flex;
  justify-content:space-between;
  font-family:'Orbitron', sans-serif;
  color:var(--accent);
  user-select: none;
  font-size:16px;
  width:100%;
  padding:0 2px;
  letter-spacing: -0.8px;
}

/* Rounds aur target ke beech extra margin zero */
.stats-row div:first-child,
.stats-row div:last-child {
  margin:0;
  padding:0;
}

.icon-box{
  display:flex;
  justify-content:space-around;
  background:var(--card);
  border:1px solid var(--accent);
  border-radius:60px;
  padding:6px 12px;
}

.icon-btn{
  background:none;
  border:none;
  color:var(--accent);
  font-size:40px;
  width:70px;
  height:60px;
  cursor:pointer;
  user-select: none;
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:var(--modal-overlay);
  display:flex;
  justify-content:center;
  align-items:center;
  opacity:0;
  visibility:hidden;
  transition:0.2s;
}

.modal-overlay.show{
  opacity:1;
  visibility:visible;
}

.modal-card{
  background:var(--card);
  border:2px solid var(--accent);
  border-radius:40px;
  padding:28px;
  width:280px;
  text-align:center;
  font-family:'Orbitron', sans-serif;
  color:var(--accent);
}

.modal-input{
  width:100%;
  padding:12px;
  border-radius:30px;
  border:2px solid var(--accent);
  background:var(--bg);
  color:var(--accent);
  font-size:18px;
  text-align:center;
  margin:15px 0;
  user-select: text;
  -webkit-user-select: text;
  -moz-user-select: text;
  -ms-user-select: text;
}

.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.modal-btn{
  padding:10px 20px;
  border-radius:30px;
  border:2px solid var(--accent);
  background:var(--accent);
  color:var(--bg);
  cursor:pointer;
  user-select: none;
  flex: 1;
}
</style>
</head>
<body>

<div class="app">

<div class="top-row">
<div class="spacer"></div>
<div class="zikr">بِسْمِ ٱللَّٰهِ ٱلرَّحْمَـٰنِ ٱلرَّحِيمِ</div>
<div class="theme-toggle" id="themeToggle" onclick="toggleLightDark()">🌙</div>
</div>

<div class="middle-section">
<div class="circle-wrapper">

<svg viewBox="0 0 300 300">
<circle class="bg" cx="150" cy="150" r="130"></circle>
<circle class="progress" cx="150" cy="150" r="130"
stroke-dasharray="817" stroke-dashoffset="817"
id="progressCircle"></circle>
</svg>

<div class="tap-area" id="tapArea" onclick="increment()">
<div class="count" id="count">0</div>
</div>

</div> <!-- circle-wrapper ends -->

<!-- ===== PERCENTAGE BELOW CIRCLE ===== -->
<div class="static-percent" id="staticPercent">0%</div>

</div> <!-- middle-section ends -->

<div class="bottom-controls">
<div class="stats-row">
<div>Rounds: <span id="rounds">0</span></div>
<div>Target: <span id="targetDisplay">∞</span></div>
</div>
<div class="icon-box">
<div class="icon-btn" onclick="reset()">↺</div>
<div class="icon-btn" onclick="decrement()">−</div>
<div class="icon-btn" onclick="showTargetModal()">🎯</div>
</div>
</div>

<div class="modal-overlay" id="targetModal">
<div class="modal-card">
<h3>SET TARGET</h3>
<input type="number" id="modalTargetInput" class="modal-input" value="33" placeholder="Enter number">
<div class="modal-actions">
  <button class="modal-btn" onclick="setTargetFromModal()">OK</button>
  <button class="modal-btn" onclick="setInfiniteTarget()">∞</button>
</div>
</div>
</div>

</div> <!-- app ends -->

<script>
let count = 0;
let target = Infinity;
let rounds = 0;
let glowTimeout = null; // track previous timeout

const circle = document.getElementById("progressCircle");
const staticPercent = document.getElementById("staticPercent");
const themeToggle = document.getElementById("themeToggle");
const tapArea = document.getElementById("tapArea");

const circumference = 2 * Math.PI * 130;
circle.style.strokeDasharray = circumference;

function updateUI() {
  document.getElementById("count").innerText = count;
  document.getElementById("rounds").innerText = rounds;

  const targetSpan = document.getElementById("targetDisplay");
  targetSpan.innerText = (target === Infinity) ? "∞" : target;

  let percent;
  if (target === Infinity) {
    percent = 0;
  } else {
    percent = (count / target) * 100;
    if (percent > 100) percent = 100;
  }

  staticPercent.innerText = Math.round(percent) + "%";
  circle.style.strokeDashoffset = circumference - (percent / 100) * circumference;

  if (target !== Infinity && count >= target) {
    rounds++;
    count = 0;
    updateUI();
  }
}

function increment() {
  count++;
  if (navigator.vibrate) navigator.vibrate(20);
  
  // GLOW FIX: har tap par glow guarantee
  if (target === Infinity) {
    // Pehle previous timeout clear karo
    if (glowTimeout) {
      clearTimeout(glowTimeout);
      glowTimeout = null;
    }
    
    // Pehle class hatao agar hai
    tapArea.classList.remove('tap-glow');
    
    // Thoda delay do taaki browser remove effect process kar le
    setTimeout(() => {
      // Ab class add karo - animation fresh start hogi
      tapArea.classList.add('tap-glow');
      
      // 200ms baad class hata do
      glowTimeout = setTimeout(() => {
        tapArea.classList.remove('tap-glow');
        glowTimeout = null;
      }, 200);
    }, 10); // 10ms delay enough hai
  }
  
  updateUI();
}

function decrement() {
  if (count > 0) {
    count--;
    updateUI();
  }
}

function reset() {
  count = 0;
  rounds = 0;
  updateUI();
}

function toggleLightDark() {
  document.body.classList.toggle("light");
  themeToggle.innerText = document.body.classList.contains("light") ? "☀️" : "🌙";
}

function showTargetModal() {
  document.getElementById("targetModal").classList.add("show");
}

function setTargetFromModal() {
  const input = document.getElementById("modalTargetInput");
  let val = parseInt(input.value);
  if (!isNaN(val) && val > 0) {
    target = val;
    count = 0;
    updateUI();
  }
  document.getElementById("targetModal").classList.remove("show");
}

function setInfiniteTarget() {
  target = Infinity;
  count = 0;
  updateUI();
  document.getElementById("targetModal").classList.remove("show");
}

function showWelcomeMessage() {
  tapArea.classList.add('glow-pulse');
  setTimeout(() => {
    tapArea.classList.remove('glow-pulse');
  }, 2000);
}

window.addEventListener('load', showWelcomeMessage);
updateUI();

document.querySelectorAll('.count, .stats-row, .icon-btn, .static-percent').forEach(el => {
  el.addEventListener('contextmenu', (e) => e.preventDefault());
  el.addEventListener('dragstart', (e) => e.preventDefault());
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('Service Worker registered!', reg))
      .catch(err => console.log('Service Worker registration failed: ', err));
  });
}
</script>

</body>
</html>
